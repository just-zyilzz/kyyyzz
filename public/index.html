<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Tools Premium</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Animated Background Blobs -->
  <div class="blob-container">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="container">
    <!-- Header with User Info and Theme Toggle -->
    <div class="header-actions">
      <span id="user-info">Tamu</span>
      <button id="auth-btn" class="btn-auth" onclick="toggleAuth()">
        Daftar / Login
      </button>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
    </div>

    <h1>✨ Media Tools ✨</h1>
    <p class="subtitle">Download Video & Audio dari YouTube, TikTok, dan Instagram Reels</p>

    <div class="input-group">
      <input type="text" id="urlInput" placeholder="Tempel link atau cari judul lagu..." />
      <button id="fetchBtn" class="btn-search">🔍 Cari</button>
    </div>

    <div class="loading">
      <div class="spinner"></div>
      <p>Sedang memproses...</p>
    </div>

    <div class="result"></div>

    <div class="tabs" id="tabs-container">
      <button class="tab-btn active" onclick="showTab('downloader')">Downloader</button>
      <button class="tab-btn" onclick="showTab('history')">Riwayat</button>
    </div>

    <div id="history" class="tab-content" style="display:none; margin-top: 20px;">
      <div id="history-list"></div>
    </div>

    <!-- Recommendations Section -->
    <div class="recommendations" id="recommendations-section">
      <div class="rec-header">🔥 Rekomendasi Musik</div>
      <div class="rec-grid" id="rec-grid">
        <!-- Items will be injected here -->
      </div>
    </div>

    <!-- Social Footer -->
    <div class="social-bar">
      <a class="social-btn" href="https://instagram.com/zyilzzz" target="_blank" aria-label="Instagram">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
        </svg>
      </a>
      <a class="social-btn" href="https://github.com/just-zyilzz" target="_blank" aria-label="GitHub">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
          </path>
        </svg>
      </a>
    </div>
  </div>

  <div id="popup" class="popup"></div>

  <script src="script.js"></script>
</body>

</html>
