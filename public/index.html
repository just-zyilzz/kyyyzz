<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> Media Tools </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="glass-blob" aria-hidden="true"></div>
    <div style="text-align: right; margin-bottom: 20px; display:flex; justify-content:flex-end; align-items:center; gap:12px;">
      <div id="social-area" style="display:flex; align-items:center; gap:10px;">
        <!-- Instagram (owner) -->
        <a id="instagram-link" class="social-link" href="https://instagram.com/zyilzzz" target="_blank" rel="noopener noreferrer" aria-label="Instagram: zyilzzz" title="Instagram: @zyilzzz">
          <svg class="social-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="5" stroke="#6a5acd" stroke-width="1.5"/>
            <path d="M12 8.5a3.5 3.5 0 100 7 3.5 3.5 0 000-7z" stroke="#6a5acd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="17.5" cy="6.5" r="0.5" fill="#6a5acd"/>
          </svg>
          <span class="social-text">@zyilzzz</span>
        </a>

        <!-- GitHub (owner) -->
        <a id="github-link" class="social-link" href="https://github.com/just-zyilzz" target="_blank" rel="noopener noreferrer" aria-label="GitHub: just-zyilzz" title="GitHub: just-zyilzz">
          <svg class="social-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 .5C5.73.5.75 5.48.75 11.76c0 4.95 3.2 9.14 7.64 10.62.56.1.76-.24.76-.54 0-.27-.01-1-.02-1.96-3.11.68-3.77-1.5-3.77-1.5-.51-1.3-1.24-1.65-1.24-1.65-1.02-.7.08-.69.08-.69 1.12.08 1.71 1.15 1.71 1.15 1 ... (truncated)" />
          </svg>
          <span class="social-text">@just-zyilzz</span>
        </a>
      </div>
      <span id="user-info">Tamu</span>
      <button id="auth-btn" onclick="toggleAuth()" style="margin-left:15px; padding:8px 16px; background:#6a5acd; color:white; border:none; border-radius:10px; cursor:pointer; font-size:15px; display:inline-block;">
        Daftar / Login
      </button>
    </div>

    <h1>✨ Media Tools ✨</h1>
    
    <div style="background:#e0e0ff; border:1px solid #c0c0ff; border-radius:10px; padding:12px; margin:15px 0; font-size:14px; color:#444;">
      <strong>✨ Hanya mendukung:</strong> YouTube, TikTok, dan Instagram Reels
    </div>

    <div class="input-group">
      <input type="text" id="urlInput" placeholder="Tempel link YouTube, TikTok, atau Instagram Reels..." />
      <button id="fetchBtn">🔍 Ambil Info</button>
    </div>

    <div class="loading">
      <div class="spinner"></div>
      <p>Mengambil metadata...</p>
    </div>

    <div class="result"></div>

    <div class="tabs" id="tabs-container">
      <button class="tab-btn active" onclick="showTab('downloader')">Downloader</button>
      <button class="tab-btn" onclick="showTab('history')">Riwayat</button>
    </div>

    <div id="history" class="tab-content" style="display:none; margin-top: 20px;">
      <h3>📜 Riwayat Unduhan</h3>
      <div id="history-list" style="margin-top: 10px;"></div>
    </div>
  </div>

  <div id="popup" class="popup"></div>

  <script src="script.js"></script>
</body>
</html>
