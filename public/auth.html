<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Daftar - Media Tools</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Auth-specific overrides */
    body {
      overflow: hidden;
    }

    /* Prevent scrolling on auth page */
    .container {
      max-width: 400px;
      padding: 40px 30px;
      text-align: center;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-group button {
      flex: 1;
    }

    .back-link {
      display: block;
      margin-top: 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover {
      color: var(--primary);
    }
  </style>
</head>

<body>
  <!-- Animated Background Blobs -->
  <div class="blob-container">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="container">
    <h1>🔐 Akses Member</h1>
    <p class="subtitle">Masuk untuk menyimpan riwayat unduhan Anda</p>

    <div style="text-align: left; margin-top: 30px;">
      <div style="margin-bottom: 15px;">
        <label style="display:block; margin-bottom:8px; font-weight:600; color:var(--text-main);">Username</label>
        <input type="text" id="username" placeholder="Masukkan username..." required />
      </div>

      <div style="margin-bottom: 15px;">
        <label style="display:block; margin-bottom:8px; font-weight:600; color:var(--text-main);">Password</label>
        <input type="password" id="password" placeholder="Masukkan password..." required />
      </div>
    </div>

    <div class="btn-group">
      <button onclick="login()" class="btn-search" style="justify-content:center;">Masuk</button>
      <button onclick="register()" class="btn-search"
        style="background:var(--accent); justify-content:center;">Daftar</button>
    </div>

    <a href="/" class="back-link">← Kembali ke Beranda</a>
  </div>

  <div id="popup" class="popup"></div>

  <script>
    // Theme init (copy from script.js for consistency)
    const stored = localStorage.getItem('theme');
    if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.body.classList.add('dark');
    }

    function showPopup(msg) {
      const popup = document.getElementById('popup');
      popup.textContent = msg;
      popup.className = 'popup show';
      setTimeout(() => popup.classList.remove('show'), 3000);
    }

    async function login() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      if (!user || !pass) return showPopup('⚠️ Isi semua kolom!');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else {
          showPopup('❌ ' + (data.error || 'Gagal login'));
        }
      } catch (e) { showPopup('❌ Error koneksi'); }
    }

    async function register() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      if (!user || !pass) return showPopup('⚠️ Isi semua kolom!');

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();
        if (data.success) {
          showPopup('✅ Berhasil daftar! Silakan login.');
        } else {
          showPopup('❌ ' + (data.error || 'Gagal daftar'));
        }
      } catch (e) { showPopup('❌ Error koneksi'); }
    }
  </script>
</body>

</html>
